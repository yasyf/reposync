name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Install jj
        run: |
          version=0.42.0
          tarball=jj-v${version}-x86_64-unknown-linux-musl.tar.gz
          curl -fsSL -o /tmp/jj.tar.gz \
            "https://github.com/jj-vcs/jj/releases/download/v${version}/${tarball}"
          tar -xzf /tmp/jj.tar.gz -C /usr/local/bin jj
          jj --version
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build ./...
