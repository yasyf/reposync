# goreleaser config — https://goreleaser.com
version: 2

project_name: reposync

before:
  hooks:
    - go mod tidy

builds:
  - id: reposync
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

# Developer-ID sign and notarize every Darwin binary before publication.
notarize:
  macos:
    - enabled: true
      ids:
        - reposync
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: yasyf
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/yasyf/reposync
    description: Keep git repos in sync across your remote hosts.
    # The sync path shells out to jj for jj-colocated repos.
    dependencies:
      - formula: jj

release:
  prerelease: auto
  # Lets the shared workflow's goreleaser retry re-upload after a mid-publish failure.
  replace_existing_artifacts: true
